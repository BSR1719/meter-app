<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1923">
<title>⚡ Meter Input</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1923; --surface:#172130; --card:#1e2d3d; --border:#2a3f52;
  --accent:#00d4aa; --warn:#ffaa00; --danger:#ff4466; --purple:#7b61ff;
  --text:#e8f0f8; --muted:#6b8299;
  --mono:'IBM Plex Mono',monospace; --thai:'Noto Sans Thai',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--thai);overscroll-behavior:none;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.logo-icon{width:26px;height:26px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);}
.date-chip{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto;}

/* Technician selector */
.tech-row{display:flex;align-items:center;gap:8px;}
.tech-label{font-size:12px;color:var(--muted);flex-shrink:0;}
select.tech-select{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;font-family:var(--thai);appearance:none;-webkit-appearance:none;}
select.tech-select.chosen{border-color:var(--purple);color:var(--purple);}

/* Period selectors */
.period-row{display:flex;gap:8px;margin-top:8px;}
.period-row select{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;font-size:12px;font-family:var(--thai);appearance:none;-webkit-appearance:none;}

/* Progress */
.progress-bar{height:2px;background:var(--border);flex-shrink:0;}
.progress-fill{height:100%;background:var(--accent);transition:width .4s;}

/* Scroll */
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;}

/* Floor section */
.floor-section{margin-bottom:14px;}
.floor-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px 8px 0 0;cursor:pointer;user-select:none;}
.floor-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;}
.floor-name{font-size:12px;font-weight:500;}
.floor-done{font-family:var(--mono);font-size:10px;}
.chevron{transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}
.floor-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow:hidden;}

/* Meter row */
.meter-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);}
.meter-row:last-child{border-bottom:none;}
.meter-id{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:76px;flex-shrink:0;}
.meter-input-wrap{flex:1;position:relative;}
.meter-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:16px;font-weight:500;padding:8px 36px 8px 10px;text-align:right;-webkit-appearance:none;transition:border-color .2s;}
.meter-input:focus{outline:none;border-color:var(--accent);}
.meter-input.has-value{border-color:rgba(0,212,170,.4);}
.meter-input::placeholder{color:var(--muted);font-size:12px;}
.unit-badge{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:9px;color:var(--muted);pointer-events:none;}

/* Save per meter button */
.btn-save-meter{background:var(--accent);border:none;border-radius:6px;color:#0f1923;font-family:var(--thai);font-size:12px;font-weight:600;padding:8px 12px;cursor:pointer;flex-shrink:0;transition:background .15s,transform .1s;white-space:nowrap;}
.btn-save-meter:active{transform:scale(.95);background:#00b891;}
.btn-save-meter:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}

/* Timestamp tag */
.ts-tag{font-family:var(--mono);font-size:9px;color:var(--accent);margin-top:3px;display:flex;align-items:center;gap:4px;}
.ts-tag.saving{color:var(--warn);}
.ts-tag.error{color:var(--danger);}

/* Numpad */
#numpad-overlay{display:none;position:fixed;inset:0;z-index:100;flex-direction:column;justify-content:flex-end;background:rgba(0,0,0,.75);}
#numpad-overlay.active{display:flex;}
.numpad-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.np-label{font-family:var(--mono);font-size:12px;color:var(--accent);}
.np-display{font-family:var(--mono);font-size:28px;font-weight:600;color:var(--text);text-align:right;min-width:140px;}
.cursor{animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.numpad-grid{background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background-color:var(--border);}
.np-btn{background:var(--card);border:none;color:var(--text);font-family:var(--mono);font-size:22px;font-weight:500;padding:18px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.np-btn:active{background:var(--border);}
.np-btn.ok{background:var(--accent);color:#0f1923;font-size:14px;font-weight:600;}
.np-btn.ok:active{background:#00b891;}
.np-btn.cancel{color:var(--muted);font-size:13px;}
.np-btn.del{color:var(--muted);font-size:16px;}

/* Bottom stats */
#bottom-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;flex-shrink:0;}
.stats-row{display:flex;align-items:center;justify-content:space-around;}
.stat{text-align:center;}
.stat .val{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--accent);}
.stat .lbl{font-size:9px;color:var(--muted);margin-top:1px;}
.divider-v{width:1px;height:28px;background:var(--border);}

/* Toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#0f1923;font-size:12px;font-weight:600;padding:8px 18px;border-radius:20px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:200;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.error{background:var(--danger);color:#fff;}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#00d4aa" stroke-width="1.4" stroke-linecap="round">
        <circle cx="6.5" cy="6.5" r="2.2"/><path d="M6.5 1v1.5M6.5 10v1.5M1 6.5h1.5M10 6.5h1.5M2.8 2.8l1 1M9.2 9.2l1 1M9.2 2.8l-1 1M2.8 9.2l1-1"/>
      </svg>
    </div>
    <span class="logo-text">METER INPUT</span>
    <span class="date-chip" id="date-chip"></span>
  </div>

  <!-- ชื่อช่าง -->
  <div class="tech-row">
    <span class="tech-label">ช่าง:</span>
    <select class="tech-select" id="sel-tech" onchange="onTechChange()">
      <option value="">— เลือกชื่อช่าง —</option>
      <option>ช่าง A</option>
      <option>ช่าง B</option>
      <option>ช่าง C</option>
      <option>ช่าง D</option>
      <option>ช่าง E</option>
    </select>
  </div>

  <!-- เดือน/ปี/วัน -->
  <div class="period-row">
    <select id="sel-month">
      <option value="1">มกราคม</option><option value="2">กุมภาพันธ์</option>
      <option value="3">มีนาคม</option><option value="4">เมษายน</option>
      <option value="5">พฤษภาคม</option><option value="6">มิถุนายน</option>
      <option value="7">กรกฎาคม</option><option value="8">สิงหาคม</option>
      <option value="9">กันยายน</option><option value="10">ตุลาคม</option>
      <option value="11">พฤศจิกายน</option><option value="12">ธันวาคม</option>
    </select>
    <select id="sel-year" style="max-width:86px;"></select>
    <select id="sel-day" style="max-width:72px;"></select>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
<div id="scroll-area"></div>

<div id="bottom-bar">
  <div class="stats-row">
    <div class="stat"><div class="val" id="stat-done">0</div><div class="lbl">บันทึกแล้ว</div></div>
    <div class="divider-v"></div>
    <div class="stat"><div class="val" id="stat-total">0</div><div class="lbl">ทั้งหมด</div></div>
    <div class="divider-v"></div>
    <div class="stat"><div class="val" id="stat-kwh">0</div><div class="lbl">kWh รวม</div></div>
  </div>
</div>
</div>

<!-- Numpad -->
<div id="numpad-overlay">
  <div class="numpad-header">
    <span class="np-label" id="np-label">—</span>
    <span class="np-display"><span id="np-display">0</span><span class="cursor">|</span></span>
  </div>
  <div class="numpad-grid">
    <button class="np-btn" onclick="npInput('7')">7</button>
    <button class="np-btn" onclick="npInput('8')">8</button>
    <button class="np-btn" onclick="npInput('9')">9</button>
    <button class="np-btn" onclick="npInput('4')">4</button>
    <button class="np-btn" onclick="npInput('5')">5</button>
    <button class="np-btn" onclick="npInput('6')">6</button>
    <button class="np-btn" onclick="npInput('1')">1</button>
    <button class="np-btn" onclick="npInput('2')">2</button>
    <button class="np-btn" onclick="npInput('3')">3</button>
    <button class="np-btn cancel" onclick="npCancel()">ยกเลิก</button>
    <button class="np-btn" onclick="npInput('0')">0</button>
    <button class="np-btn" onclick="npInput('.')">.</button>
    <button class="np-btn del" onclick="npDelete()">⌫</button>
    <button class="np-btn ok" onclick="npConfirm()">บันทึก</button>
    <button class="np-btn" onclick="npInput('00')">00</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════
// CONFIG
// ══════════════════════════════════
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyBkeYAlhP17n7KrtRAcwDY4YNNLMO32nJDiVSq9gGi9dCkbJDTjmdnZ5PRueMOK_QY/exec';

// ══════════════════════════════════
// FLOORS (id ตรงกับ METER_COLS ใน sheets-api)
// ══════════════════════════════════
const FLOORS = [
  { id:'G',    label:'Ground Floor',    meters:['BD1'],                              color:'#0099ff' },
  { id:'1',    label:'ชั้น 1 OPD/ER',   meters:['GD1','GD2','GD3'],                  color:'#7b61ff' },
  { id:'2',    label:'ชั้น 2 ICU/OBG',  meters:['2ND1','2ND2','2D1','2D2','2UD1'],   color:'#ff6b9d' },
  { id:'3',    label:'ชั้น 3 Ward 3',   meters:['3ND1','3D1','3D2','3DL1','MainNeg'],color:'#ff9500' },
  { id:'4old', label:'ชั้น 4 โซนเก่า',  meters:['4ND1','4D1'],                        color:'#34c759' },
  { id:'4new', label:'ชั้น 4 โซนใหม่',  meters:['4ND1','4D1'],                        color:'#30d158' },
  { id:'5old', label:'ชั้น 5 โซนเก่า',  meters:['5ND1','5D1','AMCC','EAMCC'],         color:'#00d4aa' },
  { id:'5new', label:'ชั้น 5 โซนใหม่',  meters:['5ND1','5D1'],                        color:'#00c7be' },
  { id:'6',    label:'ชั้น 6',           meters:['6ND1','6D1'],                        color:'#ffd60a' },
  { id:'7',    label:'ชั้น 7',           meters:['7ND1','7D1'],                        color:'#ff9f0a' },
  { id:'8',    label:'ชั้น 8',           meters:['8ND1','8D1'],                        color:'#ff6961' },
  { id:'9',    label:'ชั้น 9',           meters:['9ND1','9D1'],                        color:'#bf5af2' },
  { id:'10',   label:'ชั้น 10',          meters:['10ND1','10D1','10DLF'],             color:'#ff375f' },
];

// State
let savedValues = {};   // key=floorId-meterId → {value, time, tech}
let activeKey = null;
let npValue = '';

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
function init() {
  const now = new Date();
  document.getElementById('date-chip').textContent =
    now.toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'short'});
  document.getElementById('sel-month').value = now.getMonth()+1;

  const ys = document.getElementById('sel-year');
  for(let y=now.getFullYear()-1;y<=now.getFullYear()+1;y++){
    const o=document.createElement('option');
    o.value=y; o.textContent=y+543;
    if(y===now.getFullYear())o.selected=true;
    ys.appendChild(o);
  }
  const ds = document.getElementById('sel-day');
  for(let d=1;d<=31;d++){
    const o=document.createElement('option');
    o.value=d; o.textContent='วันที่ '+d;
    if(d===now.getDate())o.selected=true;
    ds.appendChild(o);
  }
  buildUI();
  updateStats();
}

function onTechChange(){
  const sel = document.getElementById('sel-tech');
  sel.classList.toggle('chosen', sel.value !== '');
}

// ══════════════════════════════════
// BUILD UI
// ══════════════════════════════════
function buildUI(){
  const area = document.getElementById('scroll-area');
  area.innerHTML='';
  FLOORS.forEach(floor=>{
    const sec=document.createElement('div');
    sec.className='floor-section'; sec.id='sec-'+floor.id;

    const hdr=document.createElement('div');
    hdr.className='floor-header';
    hdr.style.cssText=`background:${floor.color}18;border:1px solid ${floor.color}44;border-radius:8px 8px 0 0;`;
    hdr.innerHTML=`
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="floor-badge" style="background:${floor.color}22;color:${floor.color}">Fl.${floor.id}</span>
        <span class="floor-name">${floor.label}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="floor-done" id="done-${floor.id}" style="color:${floor.color}">0/${floor.meters.length}</span>
        <svg class="chevron open" id="chev-${floor.id}" width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="${floor.color}" stroke-width="1.5" stroke-linecap="round"><path d="M2.5 4.5l4 4 4-4"/></svg>
      </div>`;
    hdr.onclick=()=>toggleFloor(floor.id);

    const body=document.createElement('div');
    body.className='floor-body'; body.id='body-'+floor.id;

    floor.meters.forEach(mid=>{
      const key=`${floor.id}-${mid}`;
      const row=document.createElement('div');
      row.className='meter-row'; row.id='row-'+key;
      row.innerHTML=`
        <span class="meter-id">${mid}</span>
        <div class="meter-input-wrap">
          <input class="meter-input" id="inp-${key}" type="text" inputmode="none"
            placeholder="กดเพื่อกรอก" readonly
            onclick="openNumpad('${key}','${mid} Fl.${floor.id}')">
          <span class="unit-badge">kWh</span>
        </div>
        <button class="btn-save-meter" id="btn-${key}" disabled
          onclick="saveSingle('${floor.id}','${mid}')">บันทึก</button>`;

      // Timestamp tag
      const tsDiv=document.createElement('div');
      tsDiv.style.cssText='padding:0 12px 8px 12px;';
      tsDiv.innerHTML=`<div class="ts-tag" id="ts-${key}" style="display:none;"></div>`;
      body.appendChild(row);
      body.appendChild(tsDiv);
    });

    sec.appendChild(hdr); sec.appendChild(body); area.appendChild(sec);
  });
}

function toggleFloor(fid){
  const b=document.getElementById('body-'+fid),c=document.getElementById('chev-'+fid);
  b.style.display=b.style.display==='none'?'block':'none';
  c.classList.toggle('open',b.style.display!=='none');
}

// ══════════════════════════════════
// NUMPAD
// ══════════════════════════════════
function openNumpad(key,label){
  activeKey=key; npValue=savedValues[key]?.value||'';
  document.getElementById('np-label').textContent=label;
  updateNpDisplay();
  document.getElementById('numpad-overlay').classList.add('active');
  document.body.style.overflow='hidden';
}
function updateNpDisplay(){document.getElementById('np-display').textContent=npValue||'0';}
function npInput(ch){if(ch==='.'&&npValue.includes('.'))return;if(npValue==='0'&&ch!=='.')npValue=ch;else npValue+=ch;updateNpDisplay();}
function npDelete(){npValue=npValue.slice(0,-1);updateNpDisplay();}
function npCancel(){document.getElementById('numpad-overlay').classList.remove('active');document.body.style.overflow='';activeKey=null;}
function npConfirm(){
  if(!activeKey||npValue===''){npCancel();return;}
  const key=activeKey;
  const val=npValue;
  npCancel();

  // อัปเดต input field
  const inp=document.getElementById('inp-'+key);
  if(inp){inp.value=parseFloat(val).toLocaleString('th-TH',{maximumFractionDigits:1});inp.classList.add('has-value');}

  // เปิดปุ่มบันทึก
  const btn=document.getElementById('btn-'+key);
  if(btn){btn.disabled=false;}

  // เก็บค่าชั่วคราว
  const parts=key.split('-'); const floorId=parts[0]; const meterId=parts.slice(1).join('-');
  savedValues[key]={value:val, saved:false};
  updateStats();
}

// ══════════════════════════════════
// SAVE SINGLE METER
// ══════════════════════════════════
async function saveSingle(floorId, meterId){
  const tech=document.getElementById('sel-tech').value;
  if(!tech){showToast('กรุณาเลือกชื่อช่างก่อน','warn');return;}

  const key=`${floorId}-${meterId}`;
  const valObj=savedValues[key];
  if(!valObj||!valObj.value){return;}

  const btn=document.getElementById('btn-'+key);
  const tsEl=document.getElementById('ts-'+key);
  btn.disabled=true; btn.textContent='กำลังบันทึก...';
  if(tsEl){tsEl.style.display='flex';tsEl.className='ts-tag saving';tsEl.textContent='⏳ กำลังส่ง...';}

  const day=document.getElementById('sel-day').value;
  const month=document.getElementById('sel-month').value;
  const year=document.getElementById('sel-year').value;

  const payload={
    day, month, year,
    floorId, meterId,
    value: parseFloat(valObj.value),
    tech,
    mode:'single'   // บอก Apps Script ว่าบันทึกทีละตัว
  };

  if(SHEETS_URL==='YOUR_GOOGLE_APPS_SCRIPT_URL_HERE'){
    // Demo mode
    const now=new Date();
    const ts=now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    savedValues[key]={...valObj,saved:true,time:ts,tech};
    if(tsEl){tsEl.style.display='flex';tsEl.className='ts-tag';tsEl.textContent=`✓ ${ts} — ${tech}`;}
    btn.textContent='✓';btn.style.background='#1e2d3d';btn.style.color='var(--accent)';
    updateFloorDone(floorId); updateStats(); showToast('บันทึกแล้ว (Demo)');
    return;
  }

  try{
    await fetch(SHEETS_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
      mode:'no-cors'
    });

    const now=new Date();
    const ts=now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    savedValues[key]={...valObj,saved:true,time:ts,tech};

    if(tsEl){tsEl.style.display='flex';tsEl.className='ts-tag';tsEl.textContent=`✓ ${ts} — ${tech}`;}
    btn.textContent='✓';btn.style.background='#1e2d3d';btn.style.color='var(--accent)';btn.style.fontSize='16px';
    updateFloorDone(floorId); updateStats();
    showToast(`บันทึก ${meterId} แล้ว`);

  }catch(err){
    if(tsEl){tsEl.className='ts-tag error';tsEl.textContent='❌ เกิดข้อผิดพลาด';}
    btn.disabled=false;btn.textContent='บันทึก';
    showToast('เกิดข้อผิดพลาด — ตรวจสอบ internet','err');
  }
}

// ══════════════════════════════════
// STATS
// ══════════════════════════════════
function updateStats(){
  const total=FLOORS.reduce((s,f)=>s+f.meters.length,0);
  const saved=Object.values(savedValues).filter(v=>v.saved).length;
  const kwh=Object.values(savedValues).reduce((s,v)=>s+(parseFloat(v.value)||0),0);
  document.getElementById('stat-done').textContent=saved;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-kwh').textContent=kwh>0?kwh.toLocaleString('th-TH',{maximumFractionDigits:1}):'0';
  document.getElementById('progress-fill').style.width=(total>0?saved/total*100:0)+'%';
}

function updateFloorDone(floorId){
  const floor=FLOORS.find(f=>f.id===floorId);
  if(!floor)return;
  const done=floor.meters.filter(m=>savedValues[`${floorId}-${m}`]?.saved).length;
  const el=document.getElementById('done-'+floorId);
  if(el)el.textContent=`${done}/${floor.meters.length}`;
}

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className=type==='err'?'error':'';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')npCancel();});
init();
</script>
</body>
</html>
